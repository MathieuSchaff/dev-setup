"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
${custom.tmux_session}\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$cmd_duration
$character"""

add_newline = false
palette = 'catppuccin_macchiato'

[os]
disabled = true

[os.symbols]
Windows = ""
Ubuntu = "¾░Ģł"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = ""
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = ""
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[directory]
style = "bold fg:lavender"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = ""
style = "bold fg:peach"
format = '[$symbol $branch ]($style)'

[git_status]
style = "bold fg:peach"
format = '[($all_status$ahead_behind )]($style)'
# Custom symbols (defaults use "?" for untracked which looks like a missing glyph)
conflicted = "="
ahead = "ŌćĪ"
behind = "ŌćŻ"
diverged = "ŌćĢ"
up_to_date = ""
untracked = "ŌŚÅ"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "┬╗"
deleted = "Ō£ś"

[nodejs]
symbol = ""
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[c]
symbol = " "
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[rust]
symbol = ""
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[golang]
symbol = ""
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[php]
symbol = ""
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[java]
symbol = " "
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[kotlin]
symbol = ""
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[haskell]
symbol = ""
style = "bold fg:green"
format = '[$symbol( $version) ]($style)'

[python]
symbol = ""
style = "bold fg:green"
format = '[$symbol( $version)(\(#$virtualenv\)) ]($style)'

[docker_context]
symbol = ""
style = "bold fg:sapphire"
format = '[$symbol( $context) ]($style)'

[conda]
symbol = "  "
style = "bold fg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[line_break]
disabled = false

[fill]
symbol = " "

# Session tmux ŌĆö affich├®e dans le segment jaune, apr├©s la branche git
[custom.tmux_session]
description = "Current tmux session name"
command = 'tmux display-message -p "#S"'
when = 'test -n "$TMUX"'
format = '[  $output ]($style)'
style = "bold fg:yellow"
shell = ['bash', '--noprofile', '--norc']

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[ŌØ»](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = " [in $duration]($style) "
style = "fg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
# red override plus satur├® pour meilleure visibilit├® (peach/yellow gard├®s d'origine)
red = "#ff5f5f"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
