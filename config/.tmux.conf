set-option -sg escape-time 10
set-option -g focus-events on

# Terminal — true color
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features "tmux-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on
set-option -g set-titles on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vi mode + copy (tmux-yank gère le clipboard auto, détecte wl-copy/xclip)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# Scrollback plus large
set -g history-limit 50000

# Splits — démarrent dans le cwd du pane courant (au lieu de $HOME)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Plugins (déclarés pour TPM)
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect + Continuum : sauvegarde/restore auto des sessions
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Catppuccin v2 — options (à poser AVANT le `run` du plugin)
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'slanted'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Chargement explicite de catppuccin (requis par l'API v2)
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Status line — après le chargement de catppuccin pour pouvoir référencer ses modules
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_directory}'
set -agF status-right '#{E:@catppuccin_status_user}'
set -agF status-right '#{E:@catppuccin_status_session}'

# lazygit en popup flottant (Ctrl+g, sans préfixe)
bind -n C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# navi en popup flottant (Alt+n, sans préfixe) — fonctionne aussi en SSH
bind -n M-n run-shell "navi widget tmux"

# TPM — doit rester en dernière ligne
run '~/.tmux/plugins/tpm/tpm'
