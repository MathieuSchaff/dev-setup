set-option -sg escape-time 10
set-option -g focus-events on

# Terminal — true color
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features "tmux-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on
set-option -g set-titles on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Theme — Catppuccin macchiato
set -g @catppuccin_flavour 'macchiato'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory user session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Vi mode + copy
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# Plugins
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# lazygit en popup flottant (Ctrl+g, sans préfixe)
bind -n C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# navi en popup flottant (Alt+n, sans préfixe) — fonctionne aussi en SSH
bind -n M-n run-shell "navi widget tmux"

run '~/.tmux/plugins/tpm/tpm'

