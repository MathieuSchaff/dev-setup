set-option -sg escape-time 10
set-option -g focus-events on

# Terminal — true color
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features "tmux-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on
set-option -g set-titles on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vi mode + copy (tmux-yank gère le clipboard auto, détecte wl-copy/xclip)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# Scrollback plus large
set -g history-limit 50000

# Splits — démarrent dans le cwd du pane courant (au lieu de $HOME)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Plugins (déclarés pour TPM)
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect + Continuum : sauvegarde/restore auto des sessions
set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'

# Catppuccin v2 — options (à poser AVANT le `run` du plugin)
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'none' # Désactiver le style automatique pour un contrôle total
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Style des fenêtres à gauche (Style Manuel "Parallel Ribbon" identique aux sessions)
set -g window-status-separator " " # Un espace pour isoler chaque fenêtre

# Fenêtre inactive : Flamingo ($CP_FLAMINGO)
setw -g window-status-format "#[fg=$CP_SURFACE0 bg=$CP_FLAMINGO]#[fg=$CP_BASE bg=$CP_FLAMINGO] #I #W #[fg=$CP_FLAMINGO bg=$CP_SURFACE0]"

# Fenêtre active : Peach ($CP_PEACH)
setw -g window-status-current-format "#[fg=$CP_SURFACE0 bg=$CP_PEACH]#[fg=$CP_BASE bg=$CP_PEACH] #I #W #[fg=$CP_PEACH bg=$CP_SURFACE0]"

# Configuration des modules de la barre d'état (Style Manuel pour un effet ruban parfait)
set -g @directory_list "#[fg=$CP_LAVENDER bg=$CP_SURFACE0]#[fg=$CP_BASE bg=$CP_LAVENDER]#{@catppuccin_directory_icon} #{b:pane_current_path} #[fg=$CP_SURFACE0 bg=$CP_LAVENDER]"
set -g @user_list "#[fg=$CP_RED bg=$CP_SURFACE0]#[fg=$CP_BASE bg=$CP_RED]#{@catppuccin_user_icon} #{user} #[fg=$CP_SURFACE0 bg=$CP_RED]"

# Style des séparateurs globaux (Fallback)
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_status_fill "all"


# Chargement explicite de catppuccin (requis par l'API v2)
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Status line — après le chargement de catppuccin pour pouvoir référencer ses modules
set -g status-position bottom
set -g status-left-length 200
set -g status-right-length 100

set -g status-left ''

# Liste des sessions dans status-right — mode ribbon (connecté)
set -g @sessions_list "#{S:#{?session_attached,#[fg=$CP_GREEN bg=$CP_SURFACE0]#[fg=$CP_BASE bg=$CP_GREEN]#{@catppuccin_session_icon}#S #[fg=$CP_SURFACE0 bg=$CP_GREEN],#[fg=$CP_OVERLAY0 bg=$CP_SURFACE0]#[fg=$CP_BASE bg=$CP_OVERLAY0]#{@catppuccin_session_icon}#S #[fg=$CP_SURFACE0 bg=$CP_OVERLAY0]}}"

set -g status-right '#{E:@directory_list}'
set -ag status-right '#{E:@sessions_list}'
set -ag status-right '#{E:@user_list}'

# Hooks : refresh immédiat de la status bar sur les événements de session
# (sinon il faut attendre status-interval = 15s pour voir add/rename/close)
set-hook -g session-created 'refresh-client -S'
set-hook -g session-renamed 'refresh-client -S'
set-hook -g session-closed  'refresh-client -S'
set-hook -g client-session-changed 'refresh-client -S'

# lazygit en popup flottant (Ctrl+g, sans préfixe)
bind -n C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# navi en popup flottant (Alt+n, sans préfixe)
bind -n M-n display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "navi"

# Switcher de sessions en popup fzf (Alt+u, sans préfixe)
bind -n M-u display-popup -E -w 40% -h 40% "tmux list-sessions -F '#S' | grep -v \"^$(tmux display-message -p '#S')\\$\" | fzf --reverse --prompt='session> ' | xargs -r tmux switch-client -t"

# Doc cheatsheet en popup (Ctrl+e, sans préfixe)
bind -n C-e display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "zsh -c 'source ~/.zshrc && cs'"

# TPM — doit rester en dernière ligne
run '~/.tmux/plugins/tpm/tpm'
